            CopyrightStellar
        </a>
</header>
<main class="pt-[80px] px-[16px] max-w-[375px] mx-auto">
<div class="mb-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Transfer Asset</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Securely transfer ownership of your registered IP.</p>
</div>
<div class="glass-panel rounded-xl p-md flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Asset ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">vpn_key</span>
<input class="input-dark w-full h-12 rounded-lg pl-10 pr-4 font-body-sm text-body-sm text-on-surface placeholder:text-outline" placeholder="e.g. CS-992-881" type="text" value="CS-992-881"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Recipient Public Key</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">account_balance_wallet</span>
<input class="input-dark w-full h-12 rounded-lg pl-10 pr-4 font-body-sm text-body-sm text-on-surface placeholder:text-outline" placeholder="G..." type="text"/>
</div>
</div>
<div class="glass-panel bg-black/20 rounded-lg p-sm border-l-2 border-l-secondary">
<div class="flex items-start gap-2">
<span class="material-symbols-outlined text-secondary text-[20px]">info</span>
<div>
<span class="font-label-md text-label-md text-secondary uppercase block mb-1">Warning</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">Transfers are immutable. Ensure the recipient address is correct on the Stellar Soroban network.</p>
</div>
</div>
</div>
<button class="w-full h-12 bg-[#13b5b5] text-white font-label-md text-label-md uppercase tracking-wider rounded-lg teal-inner-shadow glow-hover mt-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">send</span>
